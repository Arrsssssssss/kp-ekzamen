<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KP Ekzamen</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#1a1f2e;color:#e8e0d0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px}
.wrap{width:100%;max-width:460px}
.tabs{display:flex;gap:8px;margin-bottom:20px}
.tab{flex:1;padding:10px;border-radius:10px;border:1.5px solid #3a4460;background:#242b3d;color:#7a8aaa;font-size:13px;font-weight:600;cursor:pointer;text-align:center}
.tab.active{background:#c5a05a;border-color:#c5a05a;color:#1a1f2e}
.screen{display:none}.screen.show{display:block}
#pwrap{width:100%;height:4px;background:#2a3040;border-radius:2px;margin-bottom:16px;overflow:hidden}
#pbar{height:100%;background:#c5a05a;border-radius:2px;transition:width .4s}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.qnum{font-size:12px;color:#7a8aaa}
.live-score{font-size:13px}
.badge{display:inline-block;background:#2a2010;border:1px solid #c5a05a66;color:#c5a05a;font-size:11px;padding:4px 12px;border-radius:20px;margin-bottom:12px}
.qtitle{font-size:19px;font-weight:bold;color:#e8e0d0;line-height:1.45;margin-bottom:16px;min-height:50px}
.plan-box{background:#1e2535;border:1px solid #3a4460;border-radius:12px;padding:14px;margin-bottom:14px}
.plan-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#7a8aaa;margin-bottom:10px}
.plan-item{font-size:14px;color:#b0c4e0;line-height:1.6;padding:4px 0;border-bottom:1px solid #262f42}
.plan-item:last-child{border-bottom:none}
.hint{font-size:12px;color:#4a5570;text-align:center;margin-bottom:12px}
.show-btn{width:100%;padding:14px;border-radius:12px;background:#242b3d;border:1.5px solid #c5a05a66;color:#c5a05a;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:14px}
.show-btn:active{background:#2f3a52}
.answer-box{display:none;background:#1b2b1b;border:1px solid #3a5a3a;border-radius:12px;padding:16px;margin-bottom:14px}
.answer-box.show{display:block}
.answer-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#6a9a6a;margin-bottom:10px}
.answer-text{font-size:13px;line-height:1.65;color:#c0e0c0;white-space:pre-wrap}
.check-row{display:none;gap:10px;margin-bottom:14px}
.check-row.show{display:flex}
.check-btn{flex:1;padding:14px;border-radius:12px;font-size:15px;font-weight:bold;cursor:pointer;border:1.5px solid}
.btn-yes{background:#1e3a1e;color:#a8d4a8;border-color:#4a9a4a}
.btn-no{background:#3a1e1e;color:#d4a8a8;border-color:#9a4a4a}
.next-btn{width:100%;padding:14px;border-radius:12px;background:#c5a05a;border:none;color:#1a1f2e;font-size:15px;font-weight:bold;cursor:pointer;display:none}
.next-btn.show{display:block}
.mode-banner{background:#2a2010;border:1px solid #c5a05a44;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#c5a05a;text-align:center;display:none}
.big-score{font-size:48px;font-weight:bold;color:#c5a05a;margin-bottom:6px;text-align:center}
.score-sub{font-size:15px;color:#e8e0d0;margin-bottom:4px;text-align:center}
.score-msg{font-size:13px;color:#7a8aaa;margin-bottom:20px;text-align:center}
.rsec{margin-bottom:16px}
.rsec-title{font-size:12px;letter-spacing:.08em;text-transform:uppercase;padding:8px 12px;border-radius:8px;margin-bottom:10px}
.t-bad{background:#3a1e1e;color:#d4a8a8}
.t-good{background:#1e3a1e;color:#a8d4a8}
.ritem{font-size:13px;padding:8px 12px;border-radius:8px;margin-bottom:6px;line-height:1.4;cursor:pointer}
.r-bad{background:#2e1a1a;color:#d4a8a8;border:1px solid #4a2a2a}
.r-good{background:#1a2e1a;color:#a8d4a8;border:1px solid #2a4a2a;cursor:default}
.action-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.action-btn{flex:1;padding:13px;border-radius:12px;border:1.5px solid;font-size:14px;font-weight:bold;cursor:pointer;min-width:120px}
.btn-repeat{background:#3a1e1e;color:#d4a8a8;border-color:#9a4a4a}
.btn-all{background:#1e2535;color:#7a8aaa;border-color:#3a4460}
</style>
</head>
<body>
<div class="wrap">
<div class="tabs">
  <div class="tab active" onclick="switchTab('study')" id="tab0"></div>
  <div class="tab" onclick="switchTab('results')" id="tab1"></div>
</div>
<div class="screen show" id="screenStudy">
  <div class="mode-banner" id="modeBanner"></div>
  <div id="pwrap"><div id="pbar"></div></div>
  <div class="header"><div class="qnum" id="qnum"></div><div class="live-score" id="liveScore"></div></div>
  <div class="badge" id="badge"></div>
  <div class="qtitle" id="qtitle"></div>
  <div class="plan-box">
    <div class="plan-label" id="planLabel"></div>
    <div id="planItems"></div>
  </div>
  <div class="hint" id="hint"></div>
  <button class="show-btn" id="showBtn" onclick="showAnswer()"></button>
  <div class="answer-box" id="answerBox">
    <div class="answer-label" id="answerLabel"></div>
    <div class="answer-text" id="answerText"></div>
  </div>
  <div class="check-row" id="checkRow">
    <button class="check-btn btn-yes" onclick="mark(true)" id="btnYes"></button>
    <button class="check-btn btn-no" onclick="mark(false)" id="btnNo"></button>
  </div>
  <button class="next-btn" id="nextBtn" onclick="next()"></button>
</div>
<div class="screen" id="screenResults">
  <div class="big-score" id="bigScore"></div>
  <div class="score-sub" id="scoreSub"></div>
  <div class="score-msg" id="scoreMsg"></div>
  <div class="rsec" id="secBad" style="display:none"><div class="rsec-title t-bad" id="titleBad"></div><div id="listBad"></div></div>
  <div class="rsec" id="secGood" style="display:none"><div class="rsec-title t-good" id="titleGood"></div><div id="listGood"></div></div>
  <div class="action-row">
    <button class="action-btn btn-repeat" id="btnRepeat" onclick="repeatWeak()" style="display:none"></button>
    <button class="action-btn btn-all" onclick="restartAll()" id="btnAll"></button>
  </div>
</div>
</div>

  $('answerText').textContent=q.answer;
  var plan=plans[q.num]||[q.title];
  var h='';plan.forEach(function(p){h+='<div class="plan-item">'+p+'</div>';});
  $('planItems').innerHTML=h;
  $('answerBox').className='answer-box';
  $('checkRow').className='check-row';
  $('nextBtn').className='next-btn';
  $('showBtn').style.display='block';
  var mb=$('modeBanner');
  if(isWeak){mb.style.display='block';mb.textContent=L.weakMode+': '+queue.length+' '+L.wq;}
  else mb.style.display='none';
  updateScore();marked=false;
}
function updateScore(){
  $('liveScore').innerHTML='<span style="color:#a8d4a8">✓ '+good.length+'</span>&nbsp;<span style="color:#d4a8a8">✗ '+bad.length+'</span>';
}
function showAnswer(){
  $('answerBox').className='answer-box show';
  $('checkRow').className='check-row show';
  $('showBtn').style.display='none';
}
function mark(knew){
  if(marked)return;marked=true;
  var q=queue[cur];
  if(knew){bad=bad.filter(function(b){return b.num!==q.num;});if(!good.some(function(g){return g.num===q.num;}))good.push(q);}
  else{good=good.filter(function(g){return g.num!==q.num;});if(!bad.some(function(b){return b.num===q.num;}))bad.push(q);}
  updateScore();
  $('checkRow').className='check-row';
  $('nextBtn').textContent=cur+1<queue.length?L.next:L.fin;
  $('nextBtn').className='next-btn show';
}
function next(){cur++;renderQ();}
function showResults(){
  switchTab('results');
  var pct=Math.round(good.length/questions.length*100);
  $('bigScore').textContent=good.length+' / '+questions.length;
  $('scoreSub').textContent=pct+'% '+L.znayu;
  $('scoreMsg').textContent=pct>=90?L.m1:pct>=70?L.m2:pct>=50?L.m3:L.m4;
  if(bad.length>0){
    $('secBad').style.display='block';
    $('titleBad').textContent='✗ '+L.nezn+' — '+bad.length+' '+L.wq+' ('+L.click+')';
    var h='';bad.forEach(function(q){h+='<div class="ritem r-bad" onclick="jumpTo(''+q.num+'')">['+q.num+'] '+q.title+'</div>';});
    $('listBad').innerHTML=h;
    $('btnRepeat').style.display='block';
  }else{$('secBad').style.display='none';$('btnRepeat').style.display='none';}
  if(good.length>0){
    $('secGood').style.display='block';
    $('titleGood').textContent='✓ '+L.zn+' — '+good.length+' '+L.wq;
    var h='';good.forEach(function(q){h+='<div class="ritem r-good">['+q.num+'] '+q.title+'</div>';});
    $('listGood').innerHTML=h;
  }else $('secGood').style.display='none';
}
function jumpTo(num){
  var idx=questions.findIndex(function(q){return q.num===num;});
  if(idx<0)return;
  queue=questions.slice();isWeak=false;cur=idx;marked=false;
  switchTab('study');setLabels();renderQ();
}
function repeatWeak(){init(true);}
function restartAll(){init(false);}
function switchTab(name){
  document.querySelectorAll('.screen').forEach(function(s){s.className='screen';});
  $('tab0').classList.remove('active');$('tab1').classList.remove('active');
  if(name==='study'){$('screenStudy').className='screen show';$('tab0').classList.add('active');}
  else{$('screenResults').className='screen show';$('tab1').classList.add('active');showResults();}
}
init(false);
</script>
</body>
</html>
